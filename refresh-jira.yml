# .github/workflows/refresh-jira.yml
# Keeps a sanitized jira-tickets.json fresh next to your GitHub Pages site.
# The Jira credentials live ONLY in GitHub Actions secrets — never in the page.
#
# Setup (one time):
#   1. Create a Jira API token: https://id.atlassian.com/manage-profile/security/api-tokens
#   2. In the repo: Settings > Secrets and variables > Actions > add:
#        JIRA_BASE   = https://trialbee.atlassian.net
#        JIRA_EMAIL  = the account email that owns the token
#        JIRA_TOKEN  = the API token
#   3. Make sure GitHub Pages serves from the branch/dir this commits to.
#
# IMPORTANT: this writes ticket keys, summaries, status, priority, type, created,
# and the FD# number only. Descriptions and assignees are never written, matching
# the dashboard's PII handling. Ticket *summaries* can still contain client names —
# if your Pages site is public, treat the summaries as public too.

name: Refresh Jira tickets
on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch: {}       # allow manual run

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch + sanitize tickets
        env:
          JIRA_BASE: ${{ secrets.JIRA_BASE }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
        run: |
          node <<'NODE'
          const base = process.env.JIRA_BASE.replace(/\/$/, "");
          const auth = "Basic " + Buffer.from(`${process.env.JIRA_EMAIL}:${process.env.JIRA_TOKEN}`).toString("base64");
          const jql = 'labels = "Support-ticket" AND statusCategory != Done ORDER BY created DESC';

          async function run() {
            let startAt = 0, all = [], guard = 0;
            while (guard++ < 50) {
              const url = `${base}/rest/api/3/search?jql=${encodeURIComponent(jql)}&maxResults=100&startAt=${startAt}` +
                          `&fields=summary,status,priority,issuetype,created,description`;
              const r = await fetch(url, { headers: { Authorization: auth, Accept: "application/json" } });
              if (!r.ok) throw new Error(`Jira ${r.status}: ${await r.text()}`);
              const data = await r.json();
              all = all.concat(data.issues || []);
              if (startAt + (data.issues || []).length >= data.total) break;
              startAt += 100;
            }
            const out = all.map(n => {
              const f = n.fields || {};
              const ds = typeof f.description === "string" ? f.description : JSON.stringify(f.description || "");
              const m = ds.match(/FD\s*#\s*(\d+)/i);
              return {
                key: n.key,
                fd: m ? m[1] : "N/A",
                summary: f.summary || "",
                status: (f.status && f.status.name) || "Unknown",
                cat: (f.status && f.status.statusCategory && f.status.statusCategory.name) || "To Do",
                priority: (f.priority && f.priority.name) || "None",
                type: (f.issuetype && f.issuetype.name) || "",
                created: f.created || null
              };
            });
            require("fs").writeFileSync("jira-tickets.json", JSON.stringify(out, null, 2));
            console.log("Wrote", out.length, "tickets");
          }
          run().catch(e => { console.error(e); process.exit(1); });
          NODE

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jira-tickets.json
          git diff --staged --quiet || git commit -m "chore: refresh Jira tickets [skip ci]"
          git push
